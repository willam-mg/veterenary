name: Automation Full Regression

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: Suite to run
        required: true
        default: regression
        type: choice
        options:
          - e2e
          - regression
          - all
      target_environment:
        description: Target environment for full suite
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
          - qa

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    defaults:
      run:
        working-directory: automation

    env:
      CI: true
      TEST_ENV: ${{ github.event.inputs.target_environment || 'staging' }}
      STAGING_WEB_BASE_URL: ${{ vars.STAGING_WEB_BASE_URL || 'https://veterenary-production.up.railway.app' }}
      STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL || 'https://veterenary-production.up.railway.app/api/v1' }}
      PRODUCTION_WEB_BASE_URL: ${{ vars.PRODUCTION_WEB_BASE_URL || '' }}
      PRODUCTION_API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL || '' }}
      DEMO_USER_EMAIL: ${{ secrets.DEMO_USER_EMAIL || 'admin@vetdemo.test' }}
      DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD || 'password' }}
      SELECTED_SUITE: ${{ github.event.inputs.suite || 'all' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run selected suite
        shell: bash
        run: |
          case "$SELECTED_SUITE" in
            e2e)
              npm run test:e2e
              ;;
            regression)
              npm run test:regression
              ;;
            all)
              npm run test:e2e
              npm run test:regression
              ;;
            *)
              echo "Unsupported suite: $SELECTED_SUITE"
              exit 1
              ;;
          esac

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: automation/reports/html-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-full
          path: automation/reports/allure-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-full
          path: automation/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Generate Allure report
        if: always()
        shell: bash
        run: |
          if [ -d reports/allure-results ] && [ "$(find reports/allure-results -type f | wc -l)" -gt 0 ]; then
            npx allure generate reports/allure-results --clean -o reports/allure-report
          else
            mkdir -p reports/allure-report
            cat <<'EOF' > reports/allure-report/index.html
            <!doctype html>
            <html lang="en">
              <head>
                <meta charset="utf-8" />
                <title>Allure Report</title>
              </head>
              <body>
                <h1>Allure report was not generated</h1>
                <p>No Allure results were found for this execution.</p>
              </body>
            </html>
            EOF
          fi

      - name: Upload static Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-allure-report
          path: automation/reports/allure-report
          if-no-files-found: error
          retention-days: 14
