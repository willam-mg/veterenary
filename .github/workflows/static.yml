name: Publish Static Allure Report

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Automation CI', 'Automation Full Regression']
    types: [completed]

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure report artifact from automation workflow
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.workflow.name == 'Automation CI' && 'static-allure-report-smoke' || 'static-allure-report' }}
          path: ./site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Checkout repository for manual publishing
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v5

      - name: Copy local report for manual publishing
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          if [ ! -f automation/reports/allure-report/index.html ]; then
            mkdir -p automation/reports/allure-report
            cat <<'EOF' > automation/reports/allure-report/index.html
            <!doctype html>
            <html lang="en">
              <head>
                <meta charset="utf-8" />
                <title>Allure Report</title>
              </head>
              <body>
                <h1>Allure report was not generated</h1>
                <p>No local Allure report was found for manual publishing.</p>
              </body>
            </html>
            EOF
          fi
          mkdir -p site
          cp -R automation/reports/allure-report/. site/

      - name: Validate site content
        shell: bash
        run: |
          if [ ! -f site/index.html ]; then
            echo "Expected file not found: site/index.html"
            exit 1
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
