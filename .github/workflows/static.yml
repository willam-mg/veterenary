name: Publish Static Allure Report

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Prepare placeholder site for manual publishing
        shell: bash
        run: |
          mkdir -p site
          cat <<'EOF' > site/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Allure Report</title>
            </head>
            <body>
              <h1>Manual publish placeholder</h1>
              <p>Run the automation workflow first so this job can publish a generated Allure artifact.</p>
            </body>
          </html>
          EOF

      - name: Validate site content
        shell: bash
        run: |
          if [ ! -f site/index.html ]; then
            echo "Expected file not found: site/index.html"
            exit 1
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
