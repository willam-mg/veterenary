<section class="page" data-testid="appointments-page">
  <header>
    <h1>Citas</h1>
    <p>Listado demo desde JSONPlaceholder + alta local para pruebas.</p>
  </header>

  <form
    [formGroup]="appointmentForm"
    (ngSubmit)="submit()"
    class="appointment-form"
    data-testid="appointment-form"
  >
    <input placeholder="Mascota" formControlName="petName" data-testid="appt-pet-input" />
    <input placeholder="Cliente" formControlName="ownerName" data-testid="appt-owner-input" />
    <input type="datetime-local" formControlName="date" data-testid="appt-date-input" />
    <input placeholder="Motivo" formControlName="reason" data-testid="appt-reason-input" />
    <button type="submit" data-testid="appt-submit">Registrar cita</button>
  </form>

  <p *ngIf="loading()">Cargando citas...</p>
  <p *ngIf="error()" class="error" data-testid="appointments-error">{{ error() }}</p>

  <div class="appointments-list" *ngIf="!loading() && !error()" data-testid="appointments-list">
    <article *ngFor="let appointment of appointments()" class="appointment-card" data-testid="appointment-card">
      <h2>{{ appointment.petName }}</h2>
      <p>Cliente: {{ appointment.ownerName }}</p>
      <p>Fecha: {{ appointment.date | date: 'yyyy-MM-dd HH:mm' }}</p>
      <p>Motivo: {{ appointment.reason }}</p>
      <span [class.confirmed]="appointment.status === 'confirmed'">{{ appointment.status }}</span>
    </article>
  </div>
</section>
