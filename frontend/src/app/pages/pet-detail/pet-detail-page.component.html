<section class="page" data-testid="pet-detail-page">
  <a routerLink="/pets">Volver al listado</a>

  <article *ngIf="pet(); else notFound" class="detail-card" data-testid="pet-detail-card">
    <img [src]="pet()!.imageUrl" [alt]="pet()!.name" />
    <div>
      <h1>{{ pet()!.name }}</h1>
      <p>Especie: {{ pet()!.species }}</p>
      <p>Edad: {{ pet()!.age }} anios</p>
      <p>Cliente: {{ pet()!.ownerName }}</p>
      <p>Proxima vacuna: {{ pet()!.vaccineDueDate }}</p>
    </div>
  </article>

  <ng-template #notFound>
    <p>No se encontro la mascota solicitada.</p>
  </ng-template>
</section>
